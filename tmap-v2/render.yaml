# Render.com blueprint — deploy AOF Code server.
# JWT_SECRET / AOF_MASTER_KEY are auto-generated (you never type secrets).
# NOTE: free plan has ephemeral disk → the file DB (.aof-server/db.json) resets
#       on each redeploy. Add SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY for
#       persistent storage (recommended for production use).
services:
  - type: web
    name: aof-code
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: AOF_MASTER_KEY
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: AOF_MODE
        value: normal
      # ── Supabase (persistent DB — recommended) ──────────────────────────────
      # Set these in the Render dashboard after creating a Supabase project.
      # Without them AOF Code uses an ephemeral file DB that resets on redeploy.
      - key: SUPABASE_URL
        sync: false   # fill in dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false   # fill in dashboard
      # ── Optional: rate-limit overrides ─────────────────────────────────────
      # - key: AOF_USER_BUDGET_USD
      #   value: "5.00"
      # - key: AOF_LIMIT_RUN_PER_HOUR
      #   value: "10"
      # ── Optional: restrict CORS to your frontend domain ────────────────────
      # - key: AOF_ALLOWED_ORIGINS
      #   value: "https://your-app.vercel.app"
