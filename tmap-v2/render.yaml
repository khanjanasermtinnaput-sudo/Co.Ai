# Render.com blueprint — deploy Coagentix backend (tmap-v2).
# JWT_SECRET / COAGENTIX_MASTER_KEY are auto-generated (you never type secrets).
# NOTE: free plan has ephemeral disk — for persistent multi-user use, attach a
#       Render Disk or switch db.ts to PostgreSQL.
services:
  - type: web
    name: coagentix-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: COAGENTIX_MASTER_KEY
        generateValue: true
      - key: COAGENTIX_MODE
        value: normal
