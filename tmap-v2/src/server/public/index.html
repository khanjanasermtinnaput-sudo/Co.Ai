<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AOF Code</title>
<style>
  :root{--bg:#000;--panel:#0c0c0c;--bd:#1e1e1e;--tx:#fff;--dim:#888;--acc:#ff7a00;--grn:#3dd68c;--red:#f87171;--mono:'JetBrains Mono',Consolas,monospace}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--tx);font-family:var(--mono);font-size:13px}
  .wrap{max-width:860px;margin:0 auto;padding:24px}
  h1{font-size:18px} h1 span{color:var(--acc)}
  .card{background:var(--panel);border:1px solid var(--bd);border-radius:8px;padding:16px;margin:14px 0}
  label{display:block;color:var(--dim);margin:8px 0 4px}
  input,select,button,textarea{font-family:var(--mono);font-size:13px}
  input,select,textarea{width:100%;background:#000;border:1px solid var(--bd);color:var(--tx);padding:8px;border-radius:6px}
  button{background:var(--acc);color:#000;border:0;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600}
  button.sec{background:transparent;color:var(--tx);border:1px solid var(--bd)}
  .row{display:flex;gap:8px;align-items:flex-end}
  .hidden{display:none}
  #out{background:#000;border:1px solid var(--bd);border-radius:6px;padding:12px;height:300px;overflow:auto;white-space:pre-wrap}
  .k{color:var(--dim)} .ok{color:var(--grn)} .err{color:var(--red)} .acc{color:var(--acc)}
  .planner{color:var(--acc)} .coder{color:var(--grn)} .reviewer{color:#fbbf24} .validator{color:#5b9cf6} .system{color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <h1>AOF <span>Code</span> <span class="k" style="font-size:12px">· TMAP v2</span></h1>

  <!-- AUTH -->
  <div class="card" id="auth">
    <label>Email</label><input id="email" placeholder="you@example.com">
    <label>Password (≥6)</label><input id="password" type="password">
    <div class="row" style="margin-top:12px">
      <button onclick="auth('login')">Login</button>
      <button class="sec" onclick="auth('register')">Register</button>
      <span id="authMsg" class="k"></span>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>Signed in as <span class="acc" id="who"></span></div>
        <button class="sec" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- KEYS bound to account -->
    <div class="card">
      <b>API Keys (ผูกกับ account นี้ · เข้ารหัสในเซิร์ฟเวอร์)</b>
      <div class="row">
        <div style="flex:1">
          <label>Provider</label>
          <select id="provider">
            <option value="openrouter">openrouter (key เดียวครบทุก agent)</option>
            <option value="gemini">gemini (Planner)</option>
            <option value="deepseek">deepseek (Coder)</option>
            <option value="qwen">qwen / DashScope (Reviewer)</option>
            <option value="llama">llama / Groq (Validator)</option>
          </select>
        </div>
        <div style="flex:2">
          <label>API Key</label><input id="keyval" placeholder="วาง key ที่นี่">
        </div>
        <button onclick="saveKey()">Save</button>
      </div>
      <div id="keysList" class="k" style="margin-top:10px"></div>
    </div>

    <!-- RUN -->
    <div class="card">
      <label>Task</label>
      <textarea id="task" rows="2" placeholder="build a todo REST API in Node.js"></textarea>
      <div class="row" style="margin-top:8px">
        <select id="mode" style="width:140px">
          <option value="lite">lite</option>
          <option value="normal" selected>normal</option>
          <option value="pro">pro</option>
        </select>
        <button onclick="run()">Run TMAP</button>
      </div>
      <div id="out" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('aof:token') || '';
let email = localStorage.getItem('aof:email') || '';

function show(){
  if(token){ document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('who').textContent = email; loadMe(); }
  else { document.getElementById('auth').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden'); }
}
async function api(path, method='GET', body){
  const r = await fetch(API+path,{method,headers:{'Content-Type':'application/json',
    ...(token?{Authorization:'Bearer '+token}:{})},body:body?JSON.stringify(body):undefined});
  const d = await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.error||('HTTP '+r.status)); return d;
}
async function auth(action){
  const msg=document.getElementById('authMsg'); msg.textContent='...';
  try{
    const d=await api('/v1/auth/'+action,'POST',{email:val('email'),password:val('password')});
    token=d.token; email=d.email; localStorage.setItem('aof:token',token); localStorage.setItem('aof:email',email);
    msg.textContent=''; show();
  }catch(e){ msg.textContent=e.message; msg.className='err'; }
}
function logout(){ token=''; email=''; localStorage.clear(); show(); }
async function loadMe(){
  const d=await api('/v1/me');
  document.getElementById('keysList').innerHTML = Object.entries(d.keys)
    .map(([p,v])=>`${p}: ${v?`<span class="ok">${v}</span>`:'<span class="k">— ยังไม่ตั้ง</span>'}`).join('  ·  ');
}
async function saveKey(){
  try{ await api('/v1/me/keys','PUT',{provider:val('provider'),key:val('keyval')});
    document.getElementById('keyval').value=''; loadMe(); }
  catch(e){ alert(e.message); }
}
async function run(){
  const out=document.getElementById('out'); out.innerHTML='';
  const r=await fetch(API+'/v1/run',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
    body:JSON.stringify({task:val('task'),mode:val('mode')})});
  const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
  while(true){ const {value,done}=await reader.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    let i; while((i=buf.indexOf('\n\n'))>=0){ const line=buf.slice(0,i); buf=buf.slice(i+2);
      if(line.startsWith('data: ')){ const ev=JSON.parse(line.slice(6)); render(ev); } } }
}
function render(ev){
  const out=document.getElementById('out');
  if(ev.kind==='done'){ out.innerHTML+=`\n<span class="ok">✓ done · ${(ev.files||[]).length} file(s) · ${ev.iterations} iteration(s)</span>\n`;
    (ev.files||[]).forEach(f=>out.innerHTML+=`<span class="k">— ${f.path}</span>\n`); out.scrollTop=out.scrollHeight; return; }
  const cls=ev.role||'system'; const arrow=ev.kind==='error'?'✗':ev.kind==='output'?'›':'·';
  out.innerHTML+=`<span class="${cls}">${(ev.role||'system').padEnd(10)}</span> ${arrow} ${ev.kind==='error'?'<span class="err">'+esc(ev.text)+'</span>':esc(ev.text)}\n`;
  out.scrollTop=out.scrollHeight;
}
function val(id){return document.getElementById(id).value.trim();}
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
show();
</script>
</body>
</html>
