<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="#0D0D0D"/>

  <!-- Up arrow -->
  <line x1="256" y1="110" x2="256" y2="160" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <polyline points="232,134 256,110 280,134" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Down arrow -->
  <line x1="256" y1="402" x2="256" y2="352" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <polyline points="232,378 256,402 280,378" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left arrow -->
  <line x1="110" y1="256" x2="160" y2="256" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <polyline points="134,232 110,256 134,280" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arrow -->
  <line x1="402" y1="256" x2="352" y2="256" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <polyline points="378,232 402,256 378,280" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left bracket < -->
  <polyline points="210,208 168,256 210,304" stroke="white" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="302,208 344,256 302,304" stroke="white" stroke-width="22" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash / -->
  <line x1="278" y1="198" x2="234" y2="314" stroke="white" stroke-width="22" stroke-linecap="round"/>
</svg>
