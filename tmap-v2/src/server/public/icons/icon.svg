<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="#0D0D0D"/>
  <!-- Inner frame -->
  <rect x="36" y="36" width="440" height="440" rx="52" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>

  <!-- Up arrow -->
  <line x1="256" y1="76" x2="256" y2="138" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="228,104 256,76 284,104" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Down arrow -->
  <line x1="256" y1="436" x2="256" y2="374" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="228,408 256,436 284,408" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left arrow -->
  <line x1="76" y1="256" x2="138" y2="256" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="104,228 76,256 104,284" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arrow -->
  <line x1="436" y1="256" x2="374" y2="256" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="408,228 436,256 408,284" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left bracket < -->
  <polyline points="200,196 152,256 200,316" stroke="white" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="312,196 360,256 312,316" stroke="white" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash / -->
  <line x1="284" y1="186" x2="228" y2="326" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Small diamond decoration (bottom-right) -->
  <polygon points="456,456 465,447 474,456 465,465" fill="white" opacity="0.5"/>
</svg>
