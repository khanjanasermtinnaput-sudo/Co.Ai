<?xml version="1.0" encoding="UTF-8"?>
<!--
  Nexora — Monochrome Logo (Dark on White)
  White background · 800 × 200 · SVG
  Single-color version for print, documents, and light contexts
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none" role="img" aria-label="Nexora">
  <title>Nexora</title>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="white"/>
  <rect width="800" height="200" rx="16" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ══════ MARK — dark monochrome, center (100,100), r=72 ══════ -->

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="93" stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Hex ring -->
  <polygon
    points="172,100 136,38 64,38 28,100 64,162 136,162"
    stroke="#0F0A1E" stroke-width="1.2" stroke-opacity="0.28"
    stroke-linejoin="round"
  />

  <!-- Spokes -->
  <g stroke="#0F0A1E" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.35">
    <line x1="172" y1="100" x2="100" y2="100"/>
    <line x1="136" y1="38"  x2="100" y2="100"/>
    <line x1="64"  y1="38"  x2="100" y2="100"/>
    <line x1="28"  y1="100" x2="100" y2="100"/>
    <line x1="64"  y1="162" x2="100" y2="100"/>
    <line x1="136" y1="162" x2="100" y2="100"/>
  </g>

  <!-- Outer nodes -->
  <circle cx="172" cy="100" r="5.5" fill="#0F0A1E" opacity="0.6"/>
  <circle cx="136" cy="38"  r="5.5" fill="#0F0A1E" opacity="0.6"/>
  <circle cx="64"  cy="38"  r="5.5" fill="#0F0A1E" opacity="0.6"/>
  <circle cx="28"  cy="100" r="5.5" fill="#0F0A1E" opacity="0.6"/>
  <circle cx="64"  cy="162" r="5.5" fill="#0F0A1E" opacity="0.6"/>
  <circle cx="136" cy="162" r="5.5" fill="#0F0A1E" opacity="0.6"/>

  <!-- Center node -->
  <circle cx="100" cy="100" r="15.5" fill="#0F0A1E"/>
  <circle cx="96"  cy="96"  r="4.5"  fill="white" opacity="0.6"/>

  <!-- ══════ WORDMARK ══════ -->
  <text
    x="198" y="96"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="300"
    letter-spacing="7"
    fill="#0F0A1E"
  >NEXORA</text>

  <!-- Tagline -->
  <text
    x="200" y="128"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="2.8"
    fill="#0F0A1E"
    fill-opacity="0.38"
  >MANY MINDS. ONE INTELLIGENCE.</text>

</svg>
