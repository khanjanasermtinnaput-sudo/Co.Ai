<?xml version="1.0" encoding="UTF-8"?>
<!--
  Nexora — Favicon
  32 × 32 · SVG (also scales to 16, 48, 64)
  Simplified mark: 3 outer nodes + center on dark bg
  Optimized for extreme small sizes
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Nexora">
  <title>Nexora</title>
  <defs>
    <radialGradient id="gBg" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#1a1535"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="gCenter" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="40%"  stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>
    <!-- Diagonal gradient for nodes/lines -->
    <linearGradient id="gMain" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="50%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="fGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.6" result="fc"/>
      <feComposite in="fc" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#gBg)"/>

  <!--
    Simplified hex: 3 alternating nodes for clarity at small size
    Center: (16, 16)  Outer radius: 9.5
    Top:    (16, 6.5)   — North
    BR:     (24.2, 11)  — South-East (approx)
    BL:     (7.8, 11)   — South-West
    And 3 bottom nodes:
    Bot:    (16, 25.5)
    TR:     (24.2, 21)
    TL:     (7.8, 21)

    For 32×32 favicon: use 6-node hex at r=9.5
    N1:(25.5,16) N2:(21,7)  N3:(11,7)
    N4:(6.5,16)  N5:(11,25) N6:(21,25)
  -->

  <!-- Hex ring (very thin) -->
  <polygon
    points="25.5,16 21,7 11,7 6.5,16 11,25 21,25"
    stroke="url(#gMain)" stroke-width="0.7" stroke-opacity="0.45"
    stroke-linejoin="round"
  />

  <!-- Spokes -->
  <g stroke="url(#gMain)" stroke-width="0.7" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="25.5" y1="16" x2="16" y2="16"/>
    <line x1="21"   y1="7"  x2="16" y2="16"/>
    <line x1="11"   y1="7"  x2="16" y2="16"/>
    <line x1="6.5"  y1="16" x2="16" y2="16"/>
    <line x1="11"   y1="25" x2="16" y2="16"/>
    <line x1="21"   y1="25" x2="16" y2="16"/>
  </g>

  <!-- Outer nodes (tiny but visible) -->
  <circle cx="25.5" cy="16"  r="1.5" fill="#06B6D4"/>
  <circle cx="21"   cy="7"   r="1.5" fill="#06B6D4"/>
  <circle cx="11"   cy="7"   r="1.5" fill="#22D3EE"/>
  <circle cx="6.5"  cy="16"  r="1.5" fill="#818CF8"/>
  <circle cx="11"   cy="25"  r="1.5" fill="#6366F1"/>
  <circle cx="21"   cy="25"  r="1.5" fill="#4F46E5"/>

  <!-- Center node (the "eye" — prominent at small size) -->
  <circle cx="16" cy="16" r="4.2" fill="url(#gCenter)" filter="url(#fGlow)"/>
  <circle cx="14.8" cy="14.8" r="1.2" fill="white" opacity="0.55"/>

</svg>
