name: Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - 'tmap-v2/src/**'
      - 'tmap-v2/package.json'
      - 'render.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered on Render"
