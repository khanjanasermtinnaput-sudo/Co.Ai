name: CI — Type Check & Tests

# Blocks merges to main when type checking or tests fail.
# Runs on every PR and on every push to main/feature branches.

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  # ── aof-web: Next.js TypeScript check ─────────────────────────────────────
  typecheck-web:
    name: aof-web / tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aof-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aof-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── tmap-v2: TypeScript check ─────────────────────────────────────────────
  typecheck-tmap:
    name: tmap-v2 / tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tmap-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tmap-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  # ── tmap-v2: unit tests ────────────────────────────────────────────────────
  test-tmap:
    name: tmap-v2 / tests
    runs-on: ubuntu-latest
    needs: typecheck-tmap
    defaults:
      run:
        working-directory: tmap-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tmap-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Tests run without real API keys; mock mode is activated automatically
          # when OPENROUTER_API_KEY is absent.
          NODE_ENV: test

  # ── Gate: all checks must pass before merge ────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [typecheck-web, typecheck-tmap, test-tmap]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck-web.result }}" != "success" || \
                "${{ needs.typecheck-tmap.result }}" != "success" || \
                "${{ needs.test-tmap.result }}" != "success" ]]; then
            echo "One or more CI checks failed."
            exit 1
          fi
          echo "All CI checks passed."
