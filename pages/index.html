<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coagentix — กำลังพาไปเว็บไซต์</title>
<meta http-equiv="refresh" content="0; url=https://coagentix.app/">
<link rel="canonical" href="https://coagentix.app/">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#080808;color:#EDEDF0;
    font-family:'JetBrains Mono','Consolas',monospace;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;text-align:center;
  }
  .box{max-width:420px}
  .logo{font-size:22px;font-weight:700;letter-spacing:1px;margin-bottom:18px}
  .logo span{color:#FF7A00}
  .spinner{
    width:38px;height:38px;margin:0 auto 20px;
    border:3px solid rgba(255,122,0,0.2);border-top-color:#FF7A00;
    border-radius:50%;animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  p{color:#888891;font-size:13px;line-height:1.7}
  a{color:#FF7A00;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">Coagentix <span>Platform</span></div>
    <div class="spinner"></div>
    <p>กำลังพาคุณไปยังเว็บไซต์ปัจจุบัน…</p>
    <p>ถ้าไม่เด้งอัตโนมัติ คลิก<br>
      <a href="https://coagentix.app/">coagentix.app</a>
    </p>
  </div>
  <script>
    // Clear any leftover service worker + caches from the old GitHub Pages app,
    // then redirect. Best-effort and non-blocking — the redirect fires regardless.
    (function () {
      var TARGET = 'https://coagentix.app/';
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });
          }).catch(function () {});
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          }).catch(function () {});
        }
      } catch (e) { /* ignore */ }
      location.replace(TARGET);
    })();
  </script>
</body>
</html>
