services:
  - type: web
    name: coagentix
    runtime: node
    rootDir: tmap-v2
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # COAGENTIX_MASTER_KEY encrypts every stored provider key. It must be set
      # ONCE and never change — if it is regenerated, all previously encrypted
      # user keys become permanently undecryptable. So DO NOT use generateValue
      # (Render may regenerate it on some operations). Set it by hand in the
      # dashboard (sync: false keeps it out of source): `openssl rand -hex 32`.
      - key: COAGENTIX_MASTER_KEY
        sync: false
      - key: COAGENTIX_MODE
        value: normal
      - key: NODE_ENV
        value: production
      # ── Redis (preflight P4) ───────────────────────────────────────────────────
      # This blueprint provisions NO Redis, and server/preflight.ts refuses to
      # start in production without one unless this override is set. The free
      # plan runs a single instance, which is exactly the case the override is
      # documented for (login lockout / rate limiter fall back to per-instance
      # memory). If you later add a Render Key Value instance, set REDIS_URL
      # and remove this override.
      - key: COAGENTIX_ALLOW_NO_REDIS
        value: "1"
      # ── Durable storage (DB_001) ───────────────────────────────────────────────
      # Without these, tmap-v2 falls back to an ephemeral file DB on Render's disk,
      # which is wiped on every redeploy/cold start — CLI accounts and their
      # encrypted provider keys would be LOST. Set both in the Render dashboard
      # (sync: false keeps the secret out of source control). Point at the same
      # Supabase project that aof-web uses.
      #
      # server/preflight.ts refuses to start in production when these are unset.
      # For a throwaway demo WITHOUT Supabase, add COAGENTIX_ALLOW_EPHEMERAL_DB=1
      # in the dashboard instead — accepting that accounts/keys reset on redeploy.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Optional: pin admin allowlist for /v1 privileged ops (backup/restore/DR).
      - key: COAGENTIX_ADMIN_USERNAMES
        sync: false
      # ── Provider fallback key (fixes /v1/health "providers: []") ───────────────
      # Server-level OpenRouter key used as a fallback when a user has no BYOK key.
      # Without it, every /v1/* multi-agent route fail-closes for keyless users.
      # OpenRouter exposes free models, so this costs nothing. Set the value in the
      # Render dashboard (sync: false keeps the secret out of source control); the
      # same key already lives in the repo's OPENROUTER_API_KEY GitHub secret.
      - key: OPENROUTER_API_KEY
        sync: false
