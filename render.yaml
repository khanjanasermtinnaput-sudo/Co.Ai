services:
  - type: web
    name: coagentix
    runtime: node
    rootDir: tmap-v2
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: COAGENTIX_MASTER_KEY
        generateValue: true
      - key: COAGENTIX_MODE
        value: normal
      - key: NODE_ENV
        value: production
      # ── Durable storage (DB_001) ───────────────────────────────────────────────
      # Without these, tmap-v2 falls back to an ephemeral file DB on Render's disk,
      # which is wiped on every redeploy/cold start — CLI accounts and their
      # encrypted provider keys would be LOST. Set both in the Render dashboard
      # (sync: false keeps the secret out of source control). Point at the same
      # Supabase project that aof-web uses.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Optional: pin admin allowlist for /v1 privileged ops (backup/restore/DR).
      - key: COAGENTIX_ADMIN_USERNAMES
        sync: false
